name: CI

on:
  pull_request:
    paths:
      - 'ruby-app/app.rb'

permissions:
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ruby-app
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ruby-app

      - name: RuboCop
        run: bundle exec rubocop --format markdown -o rubocop.md
        continue-on-error: true

      - name: Comment RuboCop results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('ruby-app/rubocop.md')
              ? fs.readFileSync('ruby-app/rubocop.md', 'utf8')
              : 'RuboCop did not generate a report.';
            const marker = '<!-- rubocop-report -->';
            const body = `${marker}\n${report}`;
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }