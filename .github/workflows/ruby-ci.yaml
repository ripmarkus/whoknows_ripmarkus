name: CI

on:
  pull_request:
    paths:
      - 'ruby-app/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true
          working-directory: ruby-app

      # runs the linter for Ruby
      # output is markdown format 
      - name: RuboCop
        run: bundle exec rubocop --format markdown -o rubocop.md
        continue-on-error: true


      # creates a comment with the rubocop results in .md format
      # rewrites it if there is a second check
      - name: Comment RuboCop results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ruby-app/rubocop.md', 'utf8');
            const marker = '<!-- rubocop-report -->';
            const body = `${marker}\n${report}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }