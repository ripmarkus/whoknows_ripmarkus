services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whoknows
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: whoknows
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whoknows"]
      interval: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgres://whoknows:secret@db/whoknows
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "ruby db/migrate.rb && ruby app.rb -o 0.0.0.0 -p 8080"
